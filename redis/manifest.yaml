---
# redis service (cluster internal)
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop

  labels:
    component: redis
    project: roboshop
    tier: database

spec:
  clusterIP: None

  selector:
    component: redis
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
# redis service (cluster internal)
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database

spec:
  selector:
    component: redis
    project: roboshop
    tier: database

  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
  labels:
    component: redis
    project: roboshop
    tier: database
spec:
  selector:
    matchLabels:
      component: redis
      project: roboshop
      tier: database
 # has to match .spec.template.metadata.labels
  serviceName: "redis-headless"
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        component: redis
        project: roboshop
        tier: database # has to match .spec.selector.matchLabels
    spec:
      containers:
      - name: redis
        image: sangala2025/redis:v1
        volumeMounts:
        - name: redis-data
          mountPath: /data
  volumeClaimTemplates:
  - metadata:
      name: redis-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 2Gi


