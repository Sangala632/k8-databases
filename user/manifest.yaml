# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
  
  labels:
    component: user
    project: roboshop
    tier: application

data:
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  # deployment labels
  labels:
    component: user
    project: roboshop
    tier: application

spec:
  replicas: 1
  # These are the labels replica set use to create pod replicas, this should match pod labels
  selector:
    matchLabels:
      component: user
      project: roboshop
      tier: application
  # This is pod definition
  template:
    metadata:
      labels:
        component: user
        project: roboshop
        tier: application

    spec:
      containers:
      - name: user
        image: sangala2025/user:v1
        resources:
          requests:
            cpu: "50m"
            memory: "120Mi"

          limits:
            cpu: "100m"
            memory: "256Mi"

        envFrom:
        - configMapRef:
            name: user

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop

  labels:
    component: user
    project: roboshop
    tier: application

spec:

  selector:
    component: user
    project: roboshop
    tier: application

  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 15